{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            display: flex;
            min-height: 100vh;
            transition: 0.3s;
        }

        .sidebar {
            width: 220px;
            background: #2c2f33;
            color: white;
            padding: 20px;
        }

        .sidebar a {
            display: block;
            color: white;
            padding: 10px;
            text-decoration: none;
        }

        .sidebar a:hover {
            background: #444;
        }

        .content {
            flex: 1;
            padding: 20px;
        }

        .dark-mode {
            background: #1e1e1e;
            color: white;
        }

        .card {
            border-radius: 12px;
        }

        /* 🔥 FIXED CHART SIZE */
        .chart-container {
            width: 300px;
            height: 300px;
            margin: auto;
        }
    </style>
</head>

<body id="body">

<!-- SIDEBAR -->
<div class="sidebar">
    <h4>Attendance</h4>

    <a href="/dashboard/">Dashboard</a>
    <a href="/attendance/">Start Attendance</a>
    <a href="/register/">Register Student</a>
    <a href="/students/">Students</a>
    <a href="/history/">History</a>
    <a href="/export/">Export CSV</a>
    <a href="/logout/">Logout</a>

    <hr>

    <button onclick="toggleDark()" class="btn btn-light btn-sm">🌙 Dark Mode</button>
</div>

<!-- MAIN CONTENT -->
<div class="content">

    <div class="d-flex justify-content-between align-items-center">
        <h3>Dashboard</h3>
        <div>
            👤 {{ user.username }} | {{ today }}
        </div>
    </div>

    <!-- STATS -->
    <div class="row mt-4 text-center">

        <div class="col-md-4">
            <div class="card p-3">
                <h5>Total</h5>
                <h2 id="total">{{ total }}</h2>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card p-3 bg-success text-white">
                <h5>Present</h5>
                <h2 id="present">{{ present }}</h2>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card p-3 bg-danger text-white">
                <h5>Absent</h5>
                <h2 id="absent">{{ absent }}</h2>
            </div>
        </div>

    </div>

    <hr>

    <!-- PIE CHART -->
    <div class="text-center">
        <h5>Attendance Overview</h5>

        <div class="chart-container">
            <canvas id="chart"></canvas>
        </div>
    </div>

</div>

<!-- JS -->
<script>
let chart;

// LOAD CHART
function loadChart(present, absent) {
    const ctx = document.getElementById('chart');

    if (chart) chart.destroy();

    chart = new Chart(ctx, {
        type: 'doughnut',   // 🔥 better than pie
        data: {
            labels: ['Present', 'Absent'],
            datasets: [{
                data: [present, absent],
                backgroundColor: ['#1cc88a', '#e74a3b']
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: {
                    position: 'bottom'
                }
            }
        }
    });
}

// FETCH LIVE DATA
function fetchData() {
    fetch('/dashboard-data/')
    .then(res => res.json())
    .then(data => {
        document.getElementById('total').innerText = data.total;
        document.getElementById('present').innerText = data.present;
        document.getElementById('absent').innerText = data.absent;

        loadChart(data.present, data.absent);
    });
}

// AUTO REFRESH
setInterval(fetchData, 3000);
fetchData();

// DARK MODE
function toggleDark() {
    document.getElementById('body').classList.toggle('dark-mode');
}
</script>

</body>
</html>

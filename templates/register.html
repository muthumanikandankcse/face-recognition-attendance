{% extends 'base.html' %}
{% block content %}

<div class="container mt-4">

    <div class="card p-4 shadow-lg" style="max-width: 600px; margin:auto;">
        
        <h3 class="text-center mb-4">➕ Register Student</h3>

        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Name</label>
                {{ form.name }}
            </div>

            <div class="mb-3">
                <label class="form-label">Roll Number</label>
                {{ form.roll_number }}
            </div>

            <div class="mb-3">
                <label class="form-label">Department</label>
                {{ form.department }}
            </div>

            <div class="mb-3">
                <label class="form-label">Upload Face Image</label>
                {{ form.image }}
            </div>

            <div class="text-center">
                <button class="btn btn-success px-4">Register</button>
                <a href="/dashboard/" class="btn btn-secondary">Back</a>
            </div>

        </form>
    </div>

</div>

{% endblock %}
